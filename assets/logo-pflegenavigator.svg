<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20b2aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Logo Icon: Stylized Compass with Heart/N -->
  <g transform="translate(20, 10)">
    <!-- Outer Circle -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#0f2744" stroke-width="3"/>
    
    <!-- Inner Circle -->
    <circle cx="50" cy="50" r="38" fill="#f8fafc"/>
    
    <!-- Compass Points (N, S, E, W markers) -->
    <circle cx="50" cy="12" r="4" fill="#0f2744"/>
    <circle cx="50" cy="88" r="3" fill="#64748b"/>
    <circle cx="12" cy="50" r="3" fill="#64748b"/>
    <circle cx="88" cy="50" r="3" fill="#64748b"/>
    
    <!-- N Letter in North -->
    <text x="50" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">N</text>
    
    <!-- Main Compass Needle -->
    <g transform="translate(50, 50) rotate(-45)">
      <!-- North Needle (Turquoise) -->
      <polygon points="0,-35 -8,0 8,0" fill="#20b2aa"/>
      <!-- South Needle (Dark Blue) -->
      <polygon points="0,35 -8,0 8,0" fill="#0f2744"/>
      <!-- Center Circle -->
      <circle cx="0" cy="0" r="6" fill="white" stroke="#0f2744" stroke-width="2"/>
    </g>
    
    <!-- Care/Heart accent (subtle, integrated) -->
    <path d="M 50 65 Q 42 58 50 52 Q 58 58 50 65" fill="#20b2aa" opacity="0.6"/>
  </g>
  
  <!-- Company Name -->
  <g transform="translate(130, 35)">
    <!-- PflegeNavigator -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f2744" letter-spacing="-0.5">
      Pflege<tspan fill="#20b2aa">Navigator</tspan>
    </text>
    
    <!-- EU Badge -->
    <rect x="205" y="-22" width="38" height="20" rx="3" fill="#0f2744"/>
    <text x="224" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">EU</text>
    
    <!-- Tagline -->
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">
      Ihr Weg durch die Pflege
    </text>
  </g>
  
  <!-- Bottom decorative line -->
  <line x1="130" y1="85" x2="370" y2="85" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="130" y1="85" x2="200" y2="85" stroke="#20b2aa" stroke-width="2"/>
</svg>