<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)" rx="50"/>
  
  <!-- Main Logo Centered -->
  <g transform="translate(250, 200)">
    <!-- Large Circle -->
    <circle cx="0" cy="0" r="120" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0f2744" stroke-width="4"/>
    <circle cx="0" cy="0" r="95" fill="#f8fafc"/>
    
    <!-- Direction Markers -->
    <circle cx="0" cy="-95" r="12" fill="#0f2744"/>
    <text x="0" y="-91" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">N</text>
    
    <!-- Compass Needle (Larger) -->
    <g transform="rotate(-45)">
      <polygon points="0,-80 -12,0 12,0" fill="#20b2aa"/>
      <polygon points="0,80 -12,0 12,0" fill="#0f2744"/>
      <circle cx="0" cy="0" r="14" fill="white" stroke="#0f2744" stroke-width="3"/>
    </g>
    
    <!-- Heart Element -->
    <path d="M 0 70 Q -15 55 0 45 Q 15 55 0 70" fill="#20b2aa" opacity="0.7"/>
  </g>
  
  <!-- Text Below -->
  <g transform="translate(250, 380)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0f2744">
      Pflege<tspan fill="#20b2aa">Navigator</tspan>
    </text>
    <rect x="145" y="-32" width="55" height="28" rx="4" fill="#0f2744"/>
    <text x="172" y="-12" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">EU</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
      Ihr Weg durch die Pflege
    </text>
  </g>
</svg>