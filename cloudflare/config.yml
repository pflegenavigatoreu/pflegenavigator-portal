# Cloudflare Tunnel Konfiguration für PflegeNavigator
# Ersetze <DEIN_TUNNEL_TOKEN> mit deinem Token aus dem Cloudflare Dashboard

tunnel: <DEIN_TUNNEL_ID>
credentials-file: /root/.cloudflared/<DEIN_TUNNEL_ID>.json

ingress:
  # PflegeNavigator Next.js App
  - hostname: beta.pflegenavigatoreu.com
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s
      tlsTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 30s
      httpHostHeader: beta.pflegenavigatoreu.com
  
  # Fallback - alles andere ablehnen
  - service: http_status:404

# Logging
loglevel: info
logfile: /var/log/cloudflared/tunnel.log

# Transport-Einstellungen
protocol: auto
retries: 5
grace-period: 30s

# Metriken (optional)
metrics: localhost:45678
