# GitHub Actions Secrets Template
# 
# Diese Secrets müssen in den GitHub Repository Settings konfiguriert werden:
# Settings → Secrets and variables → Actions → New repository secret
#
# =============================================================================

name: Secrets Configuration Template

on:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Checking required secrets configuration..."
          
          # Diese Secrets sollten konfiguriert sein:
          
          # VERCEL_TOKEN
          # - Beschreibung: Vercel API Token für Deployments
          # - Woher: Vercel Dashboard → Settings → Tokens
          
          # VERCEL_ORG_ID  
          # - Beschreibung: Vercel Organization ID
          # - Woher: Vercel Project Settings → General
          
          # VERCEL_PROJECT_ID
          # - Beschreibung: Vercel Project ID
          # - Woher: Vercel Project Settings → General
          
          # SUPABASE_URL
          # - Beschreibung: Supabase Project URL
          # - Woher: Supabase Dashboard → Settings → API
          
          # BREVO_API_KEY
          # - Beschreibung: Brevo (Sendinblue) API Key für E-Mails
          # - Woher: Brevo Dashboard → SMTP & API → API Keys
          
          # Optional:
          
          # SLACK_WEBHOOK_URL
          # - Beschreibung: Slack Incoming Webhook URL
          # - Woher: Slack App → Incoming Webhooks
          
          # TELEGRAM_BOT_TOKEN
          # - Beschreibung: Telegram Bot Token
          # - Woher: @BotFather auf Telegram
          
          # TELEGRAM_CHAT_ID
          # - Beschreibung: Telegram Chat ID für Notifications
          # - Woher: @userinfobot oder @RawDataBot
          
          # CODECOV_TOKEN
          # - Beschreibung: Codecov Upload Token
          # - Woher: Codecov Dashboard → Settings
          
          # LHCI_GITHUB_APP_TOKEN
          # - Beschreibung: Lighthouse CI GitHub App Token
          # - Woher: GitHub App Lighthouse CI installieren

          echo "✅ Secret check completed"

# =============================================================================
# ERSTELLUNGSSCHRITTE FÜR SECRETS:
# =============================================================================
#
# 1. VERCEL_TOKEN erstellen:
#    - Gehe zu https://vercel.com/account/tokens
#    - Klicke "Create Token"
#    - Name: "GitHub Actions"
#    - Scope: Full Account
#    - Kopiere den Token
#
# 2. VERCEL_ORG_ID & VERCEL_PROJECT_ID finden:
#    - Gehe zu deinem Vercel Projekt
#    - Settings → General
#    - Kopiere "Project ID"
#    - Kopiere "Organization ID" (aus der URL oder Settings)
#
# 3. SUPABASE_URL:
#    - Supabase Dashboard → Settings → API
#    - Kopiere "URL"
#
# 4. BREVO_API_KEY:
#    - Brevo Dashboard → SMTP & API → API Keys
#    - Erstelle neuen v3 API Key
#
# 5. GitHub Secrets hinzufügen:
#    - Repository → Settings → Secrets and variables → Actions
#    - "New repository secret" für jeden Wert
#
# =============================================================================
