name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: 🚀 Deploy Preview to Vercel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            **/.next/cache
          key: ${{ runner.os }}-nextjs-preview-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_TELEMETRY_DISABLED: 1
          VERCEL_URL: ''

      - name: Deploy Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deployment_url=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Preview URL: $DEPLOY_URL"

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            
            // Get current PR body
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const previewSection = `\n\n---\n\n🚀 **Preview Deployment**\n- **URL:** ${deployUrl}\n- **Commit:** \`${context.sha.substring(0, 7)}\`\n- **Status:** ✅ Ready`;
            
            // Check if preview section already exists
            let newBody = pr.body || '';
            if (newBody.includes('🚀 **Preview Deployment**')) {
              // Replace existing preview section
              newBody = newBody.replace(/\n\n---\n\n🚀 \*\*Preview Deployment\*\*.*$/s, previewSection);
            } else {
              newBody += previewSection;
            }
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });

      - name: Comment on PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const commitSha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);
            
            const body = `## 🚀 Preview Deployment\n\n✅ Your preview is ready!\n\n| Property | Value |\n|----------|-------|\n| **Preview URL** | [${deployUrl}](${deployUrl}) |\n| **Branch** | \`${{ github.head_ref }}\` |\n| **Commit** | \`${commitSha}\` |\n| **Deployed at** | ${new Date().toISOString()} |\n\n---\n_This comment will be updated on each deployment._`;
            
            // Look for existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingComment = comments.find(comment => 
              comment.body.includes('🚀 Preview Deployment')
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Add PR Labels
        uses: actions/labeler@v5
        if: false  # Enable if you have .github/labeler.yml
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  lighthouse-preview:
    name: ⚡ Lighthouse Preview Check
    runs-on: ubuntu-latest
    needs: deploy-preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse on Preview
        run: |
          lhci autorun --config=./lighthouserc-preview.json || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_URL: ${{ needs.deploy-preview.outputs.url }}

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-preview-report
          path: .lighthouseci/
          retention-days: 7
